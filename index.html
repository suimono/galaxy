<!DOCTYPE html
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Partikel Gestur 3D</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <style>
        /* Mengubah latar belakang dasar menjadi gradasi angkasa biru malam */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; background: radial-gradient(circle at 50% 50%, #1a1525 0%, #050505 100%); }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* Glassmorphism styling */
        .glass-panel {
            background: rgba(20, 20, 25, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Video PIP */
        #video-pip {
            transform: scaleX(-1);
            border-radius: 0.5rem;
            width: 100px;
            height: 75px;
            object-fit: cover;
            background-color: #000;
        }
        #output-canvas {
            transform: scaleX(-1);
            position: absolute;
            top: 0; left: 0;
            width: 100px; height: 75px;
            border-radius: 0.5rem;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    </style>
</head>
<body class="text-white">

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Layer -->
    <div id="ui-layer" class="w-full h-full flex flex-col justify-between pb-safe">
        
        <!-- Bagian Atas: PIP Kamera -->
        <div class="flex justify-end items-start p-4 pointer-events-none">
            <div class="glass-panel p-2 rounded-xl pointer-events-auto shadow-xl relative" id="pip-container" style="display: none;">
                <video id="input-video" class="hidden" autoplay playsinline muted></video>
                <div class="relative w-[100px] h-[75px]">
                    <video id="video-pip" autoplay playsinline muted></video>
                    <canvas id="output-canvas"></canvas>
                </div>
                <div class="mt-1 text-center text-[10px] font-mono text-blue-300 leading-tight" id="tracking-status">Menunggu Tangan</div>
                <div class="w-full bg-gray-700 h-1 mt-1 rounded overflow-hidden">
                    <div id="gesture-bar" class="bg-blue-400 h-full w-0 transition-all duration-75"></div>
                </div>
            </div>
        </div>

        <!-- Bagian Bawah: Instruksi & Panel Kontrol -->
        <div class="flex flex-col w-full pointer-events-none">
            
            <!-- Instructions -->
            <div class="text-center mb-3 px-4">
                <div class="inline-block glass-panel px-4 py-2 rounded-full shadow-lg border border-blue-500/30">
                    <p class="text-[11px] sm:text-sm text-gray-200">
                        <span class="font-bold text-white">Kosong:</span> Tabrakan Planet &nbsp;|&nbsp; 
                        <span class="font-bold text-white">Buka:</span> Tangan &nbsp;|&nbsp; 
                        <span class="font-bold text-white">Kepal:</span> Pola (Meledak)
                    </p>
                </div>
            </div>

            <!-- Controls Panel -->
            <div class="glass-panel p-5 rounded-t-3xl sm:rounded-2xl sm:mx-auto sm:mb-4 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] pointer-events-auto flex flex-col w-full sm:w-80 transition-all duration-300 border-b-0 sm:border-b">
                
                <div class="flex justify-between items-center w-full">
                    <div>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-bold">Menu Kustomisasi</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-toggle-panel" class="bg-white/10 hover:bg-white/20 text-white p-2 rounded-full transition-colors" title="Sembunyikan Panel">
                            <svg id="icon-toggle" class="w-4 h-4 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>
                    </div>
                </div>

                <div id="panel-content" class="transition-all duration-500 ease-in-out overflow-hidden flex flex-col gap-4 max-h-[500px] opacity-100 mt-4">
                    <div class="space-y-3">
                        
                        <!-- Input Teks Kustom -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider">Teks Kustom (Pola Dasar)</label>
                            <div class="flex gap-2">
                                <input type="text" id="custom-text-input" value="" maxlength="12" class="w-full bg-black/40 border border-white/10 text-white text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block px-3 py-2 outline-none transition-colors" placeholder="Ketik disini...">
                                <button id="btn-apply-text" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 rounded-xl text-xs font-bold transition-colors">Terapkan</button>
                            </div>
                        </div>

                        <!-- Pattern Selection -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider">Pilih Pola Dasar</label>
                            <select id="pattern-select" class="w-full bg-black/40 border border-white/10 text-white text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition-colors appearance-none">
                                <option value="text" class="bg-gray-900">Teks Kustom (Default)</option>
                                <option value="galaxy" class="bg-gray-900">Galaksi Spiral</option>
                                <option value="sphere" class="bg-gray-900">Bola Kuantum</option>
                                <option value="dna" class="bg-gray-900">Heliks DNA</option>
                            </select>
                        </div>

                        <!-- Color Picker -->
                        <div class="flex flex-col gap-1">
                            <label class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider">Warna Energi Utama</label>
                            <div class="flex items-center gap-3 bg-black/40 border border-white/10 rounded-xl p-2">
                                <input type="color" id="color-picker" value="#00d2ff" class="w-8 h-8 rounded-lg cursor-pointer bg-transparent border-0 p-0 shadow-sm outline-none">
                                <span class="text-sm font-mono text-gray-300 uppercase" id="color-value">#00d2ff</span>
                            </div>
                        </div>
                    </div>

                    <!-- System Controls -->
                    <button id="btn-camera" class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2 shadow-lg shadow-blue-500/30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Mulai Kamera
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        const AppState = {
            particleCount: 60000,
            baseColor: new THREE.Color('#00d2ff'),
            currentPattern: 'text',
            
            // Variabel deteksi
            isHandDetected: false, 
            
            // 3 State Beban Transisi (0.0 -> 1.0)
            weightAmbient: 1.0,
            weightHand: 0.0,
            weightPattern: 0.0,
            
            gestureOpenness: 1.0,      
            targetGestureOpenness: 1.0, 
            isGripped: false,
            gripBlast: 0.0, // Untuk animasi ledakan partikel saat mengepal
            
            targetHandPosition: new THREE.Vector3(0, 0, 0),    
            currentHandPosition: new THREE.Vector3(0, 0, 0),   
            isTransitioning: false,
            transitionProgress: 1.0,
            cameraActive: false,
            textPoints: [] 
        };

        // DOM Elements
        const container = document.getElementById('canvas-container');
        const patternSelect = document.getElementById('pattern-select');
        const colorPicker = document.getElementById('color-picker');
        const colorValue = document.getElementById('color-value');
        const btnCamera = document.getElementById('btn-camera');
        const pipContainer = document.getElementById('pip-container');
        const videoElementPip = document.getElementById('video-pip');
        const videoElementHidden = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gestureBar = document.getElementById('gesture-bar');
        const trackingStatus = document.getElementById('tracking-status');
        const btnTogglePanel = document.getElementById('btn-toggle-panel');
        const iconToggle = document.getElementById('icon-toggle');
        const panelContent = document.getElementById('panel-content');
        
        const textInput = document.getElementById('custom-text-input');
        const btnApplyText = document.getElementById('btn-apply-text');

        // Three.js Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 18;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enablePan = false;

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Latar Bintang
        const starsGeom = new THREE.BufferGeometry();
        const starsMat = new THREE.PointsMaterial({color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.4});
        const starsPts = [];
        for(let i=0; i<4000; i++) {
            starsPts.push((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*100 - 30);
        }
        starsGeom.setAttribute('position', new THREE.Float32BufferAttribute(starsPts, 3));
        const starField = new THREE.Points(starsGeom, starsMat);
        scene.add(starField);

        function generateTextPoints(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 512; canvas.height = 256;

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = 'bold 100px "Segoe UI", Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const points = [];

            for (let y = 0; y < canvas.height; y += 3) {
                for (let x = 0; x < canvas.width; x += 3) {
                    const index = (y * canvas.width + x) * 4;
                    if (data[index] > 128) {
                        const pX = (x - canvas.width / 2) * 0.05;
                        const pY = -(y - canvas.height / 2) * 0.05;
                        const pZ = (Math.random() - 0.5) * 0.5;
                        points.push(new THREE.Vector3(pX, pY, pZ));
                    }
                }
            }
            if (points.length === 0) points.push(new THREE.Vector3(0,0,0));
            return points;
        }

        AppState.textPoints = generateTextPoints(textInput.value);

        const Patterns = {
            text: (index, total) => {
                const pt = AppState.textPoints[index % AppState.textPoints.length];
                return new THREE.Vector3(pt.x + (Math.random()-0.5)*0.1, pt.y + (Math.random()-0.5)*0.1, pt.z);
            },
            sphere: (index, total) => {
                const phi = Math.acos(-1 + (2 * index) / total);
                const theta = Math.sqrt(total * Math.PI) * phi;
                const r = 5 + (Math.random() * 0.2);
                return new THREE.Vector3(r * Math.cos(theta) * Math.sin(phi), r * Math.sin(theta) * Math.sin(phi), r * Math.cos(phi));
            },
            galaxy: (index, total) => {
                const arms = 4;
                const r = Math.random() * 8;
                const a = Math.random() * Math.PI * 2;
                const armAngle = (Math.floor(Math.random() * arms) / arms) * Math.PI * 2;
                const spin = r * 0.5;
                const finalAngle = armAngle + spin + (Math.random() * 0.5 - 0.25);
                return new THREE.Vector3(Math.cos(finalAngle) * r, (Math.random() - 0.5) * (1.0 - r/8) * 2.0, Math.sin(finalAngle) * r);
            },
            dna: (index, total) => {
                const height = 15;
                const y = (Math.random() - 0.5) * height;
                const phase = y * 1.0;
                const strand = Math.random() > 0.5 ? 0 : Math.PI;
                const r = 2.5 + (Math.random() * 0.2);
                if (Math.random() > 0.9) {
                    const rBridge = Math.random() * 2.5;
                    const bridgeStrand = Math.random() > 0.5 ? 0 : Math.PI;
                    return new THREE.Vector3(Math.cos(phase + bridgeStrand) * rBridge, y, Math.sin(phase + bridgeStrand) * rBridge);
                }
                return new THREE.Vector3(Math.cos(phase + strand) * r, y, Math.sin(phase + strand) * r);
            }
        };

        let particleGeometry = new THREE.BufferGeometry();
        let positions = new Float32Array(AppState.particleCount * 3);
        let targets = new Float32Array(AppState.particleCount * 3);
        let randoms = new Float32Array(AppState.particleCount * 3);

        let handPositions = new Float32Array(AppState.particleCount * 3);
        let ambientPositions = new Float32Array(AppState.particleCount * 3); // Untuk posisi melayang bebas
        const planetIDs = new Float32Array(AppState.particleCount); // ID Planet untuk tabrakan
        const assignedBone = new Uint8Array(AppState.particleCount);
        const boneLerp = new Float32Array(AppState.particleCount);

        for (let i = 0; i < AppState.particleCount; i++) {
            const pt = Patterns[AppState.currentPattern](i, AppState.particleCount);
            
            positions[i * 3] = pt.x; positions[i * 3 + 1] = pt.y; positions[i * 3 + 2] = pt.z;
            targets[i * 3] = pt.x; targets[i * 3 + 1] = pt.y; targets[i * 3 + 2] = pt.z;
            
            const u = Math.random() * Math.PI * 2;
            const v = Math.acos(2 * Math.random() - 1);
            randoms[i * 3] = Math.sin(v) * Math.cos(u);
            randoms[i * 3 + 1] = Math.sin(v) * Math.sin(u);
            randoms[i * 3 + 2] = Math.cos(v);

            // Sebar partikel untuk mode "Kosong" (Dibuat 2 Planet yang bertabrakan)
            const isPlanet1 = i % 2 === 0;
            planetIDs[i] = isPlanet1 ? -1.0 : 1.0;

            let rA, thetaA, phiA;
            const randObj = Math.random();
            
            if (randObj > 0.4) {
                // Inti planet padat (Sphere)
                rA = 3.5 * Math.cbrt(Math.random()); 
                thetaA = Math.random() * 2 * Math.PI;
                phiA = Math.acos(2 * Math.random() - 1);
            } else if (randObj > 0.1) {
                // Cincin / Sabuk Asteroid
                rA = 5 + Math.random() * 7;
                thetaA = Math.random() * 2 * Math.PI;
                phiA = (Math.PI / 2) + (Math.random() - 0.5) * 0.2;
            } else {
                // Debu bintang luas
                rA = 12 * Math.random();
                thetaA = Math.random() * 2 * Math.PI;
                phiA = Math.acos(2 * Math.random() - 1);
            }

            // Posisi lokal partikel relatif terhadap inti planetnya
            ambientPositions[i * 3] = rA * Math.sin(phiA) * Math.cos(thetaA);
            ambientPositions[i * 3 + 1] = rA * Math.cos(phiA);
            ambientPositions[i * 3 + 2] = rA * Math.sin(phiA) * Math.sin(thetaA);

            assignedBone[i] = Math.floor(Math.random() * 21);
            boneLerp[i] = Math.random();
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('aTarget', new THREE.BufferAttribute(targets, 3));
        particleGeometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 3));
        particleGeometry.setAttribute('aHandPos', new THREE.BufferAttribute(handPositions, 3)); 
        particleGeometry.setAttribute('aAmbientPos', new THREE.BufferAttribute(ambientPositions, 3));
        particleGeometry.setAttribute('aPlanetID', new THREE.BufferAttribute(planetIDs, 1)); // Atribut untuk tabrakan

        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uColor: { value: AppState.baseColor },
                uScale: { value: 1.0 },       
                uWeightAmbient: { value: 1.0 }, 
                uWeightHand: { value: 0.0 }, 
                uWeightPattern: { value: 0.0 }, 
                uTransition: { value: 1.0 },  
                uGripBlast: { value: 0.0 }, // Animasi ledakan
                uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
            },
            vertexShader: `
                uniform float uTime;
                uniform float uScale;
                uniform float uWeightAmbient;
                uniform float uWeightHand;
                uniform float uWeightPattern;
                uniform float uTransition;
                uniform float uGripBlast;
                uniform float uPixelRatio;

                attribute vec3 aTarget;
                attribute vec3 aRandom;
                attribute vec3 aHandPos;
                attribute vec3 aAmbientPos;
                attribute float aPlanetID;

                varying float vAlpha;
                varying float vHandWeight;
                varying float vPatternWeight;
                varying float vBlast;

                void main() {
                    vHandWeight = uWeightHand;
                    vPatternWeight = uWeightPattern;
                    vBlast = uGripBlast;
                    
                    // Transisi ubah pola dari menu
                    vec3 morphedPos = mix(position, aTarget, uTransition);

                    // POSISI 1: Pola Normal (Teks/Galaksi/Bola)
                    vec3 normalPos = morphedPos;
                    normalPos.x += sin(uTime * 1.5 + normalPos.y * 2.0) * 0.1;
                    normalPos.y += cos(uTime * 1.2 + normalPos.z * 2.0) * 0.1;
                    normalPos += aRandom * (uGripBlast * 2.5); // Dorongan keluar saat mengepal

                    // POSISI 2: Partikel menyusun kerangka Jari/Tangan
                    vec3 handPos = aHandPos + (aRandom * 0.025); 

                    // POSISI 3: Tabrakan 2 Galaksi / Planet (Kosong/Ambient)
                    vec3 localPos = aAmbientPos;
                    
                    // 1. Pusaran rotasi pada inti galaksinya
                    float localDist = length(localPos.xz);
                    float localSpin = uTime * (2.0 / (localDist + 0.5)) * aPlanetID;
                    float sl = sin(localSpin); float cl = cos(localSpin);
                    localPos = vec3(localPos.x * cl - localPos.z * sl, localPos.y, localPos.x * sl + localPos.z * cl);
                    
                    // 2. Jarak planet bertabrakan (bergerak mendekat dan menjauh via cosinus)
                    float crashCycle = cos(uTime * 0.3); 
                    float orbitDist = 15.0 * crashCycle;
                    
                    // 3. Putaran orbit global berdua
                    float globalOrbit = uTime * 0.5;
                    float sg = sin(globalOrbit); float cg = cos(globalOrbit);
                    
                    vec3 corePos = vec3(orbitDist * aPlanetID, sin(uTime * 1.5 + aPlanetID)*1.5, (orbitDist * 0.5) * aPlanetID);
                    corePos = vec3(corePos.x * cg - corePos.z * sg, corePos.y, corePos.x * sg + corePos.z * cg);
                    
                    // 4. Efek ledakan partikel berserakan saat bertabrakan di tengah
                    float distToCenter = length(corePos);
                    if (distToCenter < 6.0) {
                        float chaos = (6.0 - distToCenter) * 0.8;
                        localPos += aRandom * chaos * sin(uTime * 15.0);
                        localPos.y += sin(localPos.x * 15.0 + uTime) * chaos;
                        localPos *= 1.0 + chaos * 0.2;
                    }
                    
                    vec3 ambientPos = corePos + localPos;
                    
                    // Mix 3 posisi berdasarkan weight transisi aktif
                    vec3 finalPos = (ambientPos * uWeightAmbient) + (handPos * uWeightHand) + (normalPos * uWeightPattern);
                    finalPos *= uScale;

                    vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                    
                    // Ukuran titik partikel, membesar saat meledak
                    gl_PointSize = (8.0 * uPixelRatio) / -mvPosition.z * (1.0 + uGripBlast * 2.0);
                    vAlpha = clamp(1.0 - (mvPosition.z * 0.02), 0.2, 1.0);

                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vAlpha;
                varying float vHandWeight;
                varying float vPatternWeight;
                varying float vBlast;

                void main() {
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    float dist = length(coord);
                    
                    if (dist > 0.5) discard;
                    
                    float intensity = pow(1.0 - (dist * 2.0), 1.5);
                    
                    // Warna plasma inti putih/kuning
                    vec3 coreColor = vec3(1.0, 1.0, 0.8); 
                    vec3 blastColor = vec3(1.0, 0.6, 0.1); 
                    
                    // Warnanya berubah tergantung fase partikelnya
                    vec3 finalColor = mix(uColor, coreColor, vHandWeight * 0.8 + vPatternWeight * 0.5);
                    finalColor = mix(finalColor, blastColor, vBlast); // Terapkan warna kilatan panas
                    
                    gl_FragColor = vec4(finalColor, intensity * vAlpha + (vHandWeight * 0.3) + (vBlast * 0.6));
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        function changePattern(newPatternName) {
            AppState.currentPattern = newPatternName;
            AppState.isTransitioning = true;
            AppState.transitionProgress = 0.0;
            particleMaterial.uniforms.uTransition.value = 0.0;

            const posAttr = particleGeometry.attributes.position;
            const targetAttr = particleGeometry.attributes.aTarget;

            for (let i = 0; i < posAttr.count; i++) {
                posAttr.setXYZ(i, targetAttr.getX(i), targetAttr.getY(i), targetAttr.getZ(i));
            }

            for (let i = 0; i < AppState.particleCount; i++) {
                const pt = Patterns[AppState.currentPattern](i, AppState.particleCount);
                targetAttr.setXYZ(i, pt.x, pt.y, pt.z);
            }

            posAttr.needsUpdate = true;
            targetAttr.needsUpdate = true;
        }

        // Fungsi menghitung seberapa kuat tangan mengepal
        function calculateHandOpenness(landmarks) {
            const wrist = landmarks[0];
            const fingers = [
                { tip: 8, mcp: 5 },   // Telunjuk
                { tip: 12, mcp: 9 },  // Tengah
                { tip: 16, mcp: 13 }, // Manis
                { tip: 20, mcp: 17 }  // Kelingking
            ];

            let totalRatio = 0;
            for(let i=0; i<fingers.length; i++) { 
                const tip = landmarks[fingers[i].tip];
                const mcp = landmarks[fingers[i].mcp];
                
                const tipDist = Math.hypot(wrist.x - tip.x, wrist.y - tip.y, wrist.z - tip.z);
                const mcpDist = Math.hypot(wrist.x - mcp.x, wrist.y - mcp.y, wrist.z - mcp.z);
                
                if (mcpDist > 0) totalRatio += (tipDist / mcpDist);
            }
            
            const avgRatio = totalRatio / 4.0;
            const minRatio = 0.8; 
            const maxRatio = 1.8; 
            
            let openness = (avgRatio - minRatio) / (maxRatio - minRatio);
            openness = Math.max(0.0, Math.min(1.0, openness));
            return openness * openness * (3 - 2 * openness); // Smoothstep
        }

        let hands;
        let cameraMP;

        async function initCamera() {
            if (AppState.cameraActive) return;
            
            if (window.isSecureContext === false) {
                btnCamera.innerHTML = `Butuh HTTPS / Host Lokal`;
                btnCamera.classList.add('bg-red-600', 'shadow-red-500/30');
                trackingStatus.innerText = "Kamera butuh HTTPS.";
                return;
            }

            btnCamera.innerHTML = `<svg class="animate-spin w-5 h-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memuat...`;
            btnCamera.disabled = true;

            try {
                hands = new window.Hands({locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }});

                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.6,
                    minTrackingConfidence: 0.6
                });

                hands.onResults(onHandResults);

                const constraints = { video: { width: { ideal: 320 }, height: { ideal: 240 }, facingMode: "user" } };

                navigator.mediaDevices.getUserMedia(constraints)
                .then((stream) => {
                    videoElementHidden.srcObject = stream;
                    videoElementPip.srcObject = stream;
                    
                    cameraMP = new window.Camera(videoElementHidden, {
                        onFrame: async () => { await hands.send({image: videoElementHidden}); },
                        width: 320, height: 240
                    });
                    
                    cameraMP.start();
                    AppState.cameraActive = true;
                    btnCamera.disabled = false;
                    pipContainer.style.display = 'block';
                    btnCamera.innerHTML = `Kamera Aktif`;
                    btnCamera.classList.replace('bg-blue-600', 'bg-green-600');
                    btnCamera.classList.replace('hover:bg-blue-500', 'hover:bg-green-500');
                })
                .catch(err => {
                    console.error("Kamera error:", err);
                    btnCamera.innerHTML = `Kamera Gagal`;
                    btnCamera.disabled = false;
                    btnCamera.classList.replace('bg-blue-600', 'bg-red-600');
                });

            } catch(e) { console.error(e); }
        }

        function onHandResults(results) {
            canvasElement.width = videoElementPip.videoWidth || 100;
            canvasElement.height = videoElementPip.videoHeight || 75;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // (DIUBAH) Langsung set terdeteksi, tanpa mengukur genggaman
                AppState.isHandDetected = true; 
                
                trackingStatus.innerText = "Tangan Terlacak";
                trackingStatus.className = "mt-1 text-center text-[10px] font-mono text-green-400 leading-tight";
                
                const landmarks = results.multiHandLandmarks[0];
                
                window.drawConnectors(canvasCtx, landmarks, window.HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 1.5});
                window.drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 0.5, radius: 1.5});
                
                // Deteksi Genggaman secara Realtime
                AppState.targetGestureOpenness = calculateHandOpenness(landmarks);

                const vFov = camera.fov * Math.PI / 180;
                const viewportHeight = 2 * Math.tan(vFov / 2) * Math.abs(camera.position.z);
                const viewportWidth = viewportHeight * (window.innerWidth / window.innerHeight);

                const palm = landmarks[9];
                const targetX = (0.5 - palm.x) * viewportWidth; 
                const targetY = -(palm.y - 0.5) * viewportHeight;
                
                AppState.targetHandPosition.set(targetX, targetY, 0);

                if (window.HAND_CONNECTIONS) {
                    const handPosArray = particleGeometry.attributes.aHandPos.array;
                    const connections = window.HAND_CONNECTIONS;
                    const numCon = connections.length;

                    for (let i = 0; i < AppState.particleCount; i++) {
                        const boneIdx = assignedBone[i] % numCon;
                        const bone = connections[boneIdx];
                        const startNode = landmarks[bone[0]];
                        const endNode = landmarks[bone[1]];
                        
                        let t = boneLerp[i];
                        if (i % 4 === 0) t = 1.0; 
                        if (i % 4 === 1) t = 0.0; 

                        const x = startNode.x + (endNode.x - startNode.x) * t;
                        const y = startNode.y + (endNode.y - startNode.y) * t;
                        const z = startNode.z + (endNode.z - startNode.z) * t;

                        const lx = (0.5 - x) * viewportWidth - targetX; 
                        const ly = -(y - 0.5) * viewportHeight - targetY;
                        const lz = -z * viewportWidth * 1.5; 

                        handPosArray[i * 3] = lx;
                        handPosArray[i * 3 + 1] = ly;
                        handPosArray[i * 3 + 2] = lz;
                    }
                    particleGeometry.attributes.aHandPos.needsUpdate = true;
                }

            } else {
                AppState.isHandDetected = false;
                trackingStatus.innerText = "Mencari Tangan...";
                trackingStatus.className = "mt-1 text-center text-[10px] font-mono text-yellow-500 animate-pulse leading-tight";
                
                AppState.targetGestureOpenness = 1.0;
                AppState.targetHandPosition.set(0, 0, 0); // Kembali ke tengah
            }
            canvasCtx.restore();
        }

        // --- Event Listeners UI ---
        btnApplyText.addEventListener('click', () => {
            const newText = textInput.value.trim() || "KOSONG";
            AppState.textPoints = generateTextPoints(newText);
            
            patternSelect.value = "text";
            changePattern("text");
        });
        
        textInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') btnApplyText.click();
        });

        btnTogglePanel.addEventListener('click', () => {
            panelContent.classList.toggle('max-h-0');
            panelContent.classList.toggle('max-h-[500px]');
            panelContent.classList.toggle('opacity-0');
            panelContent.classList.toggle('opacity-100');
            panelContent.classList.toggle('mt-4');
            iconToggle.classList.toggle('rotate-180');
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            particleMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
        });

        patternSelect.addEventListener('change', (e) => {
            changePattern(e.target.value);
        });

        colorPicker.addEventListener('input', (e) => {
            const hex = e.target.value;
            colorValue.innerText = hex;
            AppState.baseColor.set(hex);
            particleMaterial.uniforms.uColor.value = AppState.baseColor;
        });

        btnCamera.addEventListener('click', initCamera);

        window.addEventListener('load', () => {
            initCamera();
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            particleMaterial.uniforms.uTime.value = time;

            // Animasi transisi pindah pola (dari menu drop down)
            if (AppState.isTransitioning) {
                AppState.transitionProgress += delta * 1.5; 
                if (AppState.transitionProgress >= 1.0) {
                    AppState.transitionProgress = 1.0;
                    AppState.isTransitioning = false;
                }
                particleMaterial.uniforms.uTransition.value = AppState.transitionProgress;
            }

            // --- ANIMASI TERBENTUKNYA TANGAN & EFEK LEDAKAN MENGEPAL ---
            AppState.currentHandPosition.lerp(AppState.targetHandPosition, 5.0 * delta);
            particleSystem.position.copy(AppState.currentHandPosition);

            // Lerp Hand Openness (Penghalus data kamera)
            AppState.gestureOpenness += (AppState.targetGestureOpenness - AppState.gestureOpenness) * (delta * 8.0);
            
            // Logika Mengepal
            const wasGripped = AppState.isGripped;
            AppState.isGripped = AppState.gestureOpenness < 0.35; // Batas mengepal

            // Trigger efek ledakan persis saat jari mengepal penuh
            if (AppState.isGripped && !wasGripped && AppState.isHandDetected) {
                AppState.gripBlast = 1.0;
            }
            // Meredakan energi ledakan perlahan-lahan
            AppState.gripBlast = THREE.MathUtils.lerp(AppState.gripBlast, 0.0, delta * 3.0);

            // Logika 3 Fase (State Machine Transisi):
            // 1. Tangan Tidak Ada -> Kosong melayang bebas (Ambient)
            // 2. Tangan Terbuka -> Menyusun jari (Hand)
            // 3. Tangan Mengepal -> Membentuk teks/pola (Pattern)
            let tAmbient = 0.0, tHand = 0.0, tPattern = 0.0;
            
            if (!AppState.isHandDetected) {
                tAmbient = 1.0;
            } else {
                if (AppState.isGripped) tPattern = 1.0;
                else tHand = 1.0;
            }

            // Penghalusan transisi morphing grafik
            const morphSpeed = AppState.isHandDetected ? 7.0 : 2.5;
            AppState.weightAmbient += (tAmbient - AppState.weightAmbient) * (delta * morphSpeed);
            AppState.weightHand += (tHand - AppState.weightHand) * (delta * morphSpeed);
            AppState.weightPattern += (tPattern - AppState.weightPattern) * (delta * morphSpeed);

            particleMaterial.uniforms.uScale.value = 1.0 + (AppState.gripBlast * 0.15); // Mengembang sesaat saat meledak
            particleMaterial.uniforms.uWeightAmbient.value = AppState.weightAmbient;
            particleMaterial.uniforms.uWeightHand.value = AppState.weightHand;
            particleMaterial.uniforms.uWeightPattern.value = AppState.weightPattern;
            particleMaterial.uniforms.uGripBlast.value = AppState.gripBlast;

            // EFEK CAHAYA (BLOOM) Makin terang gila saat meledak
            bloomPass.strength = 1.2 + (AppState.weightHand * 0.4) + (AppState.weightPattern * 0.6) + (AppState.gripBlast * 2.5);

            // Update UI Bar Indikator Mengepal
            gestureBar.style.width = `${Math.max(5, AppState.gestureOpenness * 100)}%`;
            if (AppState.isGripped) gestureBar.className = "bg-red-500 h-full transition-all duration-75 shadow-[0_0_10px_red]";
            else if (AppState.gestureOpenness < 0.7) gestureBar.className = "bg-yellow-400 h-full transition-all duration-75";
            else gestureBar.className = "bg-blue-400 h-full transition-all duration-75";

            // Animasi rotasi ambient
            if (AppState.isHandDetected && !AppState.isGripped) {
                // Tangan usahakan lurus menghadap kamera
                particleSystem.rotation.y = THREE.MathUtils.lerp(particleSystem.rotation.y, 0, delta * 5);
                particleSystem.rotation.x = THREE.MathUtils.lerp(particleSystem.rotation.x, 0, delta * 5);
            } else {
                if (AppState.currentPattern === 'text') {
                    particleSystem.rotation.y = THREE.MathUtils.lerp(particleSystem.rotation.y, 0, delta * 2);
                    particleSystem.rotation.x = THREE.MathUtils.lerp(particleSystem.rotation.x, 0, delta * 2);
                } else {
                    particleSystem.rotation.y += delta * 0.2; // Pola bola/galaksi berputar pelan
                }
            }
            
            starField.rotation.y -= delta * 0.02;

            composer.render();
        }

        animate();

    </script>
</body>
